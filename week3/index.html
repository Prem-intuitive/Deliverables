<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Quiz</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <main class="container">

        <!-- Start Screen -->
        <section id="start-screen" class="card">
            <h1>JavaScript Quiz</h1>
            <p>Test your JavaScript & TypeScript basics.</p>
            <button id="start-btn">Start Quiz</button>
        </section>

        <!-- Quiz Screen -->
        <section id="quiz-screen" class="card hidden">
            <div class="top-bar">
                <div>
                    <span>Question</span>
                    <strong id="question-number">1 / 10</strong>
                </div>

                <div>
                    <span>Time</span>
                    <strong id="timer">00 : 00</strong>
                </div>

                <div>
                    <span>Score</span>
                    <strong id="score">0</strong>
                </div>
            </div>

            <div class="question-area">
                <h2 id="question">Question Text</h2>
            </div>

            <div id="options" class="options">
                <button class="option-btn">Option A</button>
                <button class="option-btn">Option B</button>
                <button class="option-btn">Option C</button>
                <button class="option-btn">Option D</button>
            </div>

            <div class="actions">
                <button id="next-btn">Next</button>
            </div>

        </section>

        <!-- Result Screen -->
        <section id="result-screen" class="card hidden">
            <h1>Quiz Complete</h1>

            <div class="result-info">
                <p>Score</p>
                <h2 id="final-score">0 / 5</h2>

                <p>Time Taken</p>
                <h2 id="time-taken">00:00</h2>
            </div>
            
            <button id="restart-btn">Restart Quiz</button>

        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
